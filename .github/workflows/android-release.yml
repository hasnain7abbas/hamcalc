name: Android Release

# Auto-bumps the patch version on every push to main, builds a debug-signed
# Android APK via Tauri 2's Android target, and publishes it to a v<X.Y.Z>
# GitHub release. The debug signature makes the APK installable via sideload;
# real release signing kicks in automatically when the ANDROID_* secrets below
# are set.
#
# Adapted from Razee4315/Tauri_Android_Template — the differences are: this
# workflow runs `cargo tauri android init` inside CI rather than expecting a
# pre-committed src-tauri/gen/android, and it ships HamCalc-named artifacts.
#
# ─── ONE-TIME SETUP FOR SIGNED BUILDS (optional) ─────────────────────────────
# Repo → Settings → Secrets → Actions, add:
#   ANDROID_KEYSTORE_BASE64   base64-encoded .keystore file
#   ANDROID_KEY_ALIAS         key alias
#   ANDROID_KEY_PASSWORD      key password
#   ANDROID_STORE_PASSWORD    keystore store password
# Without those secrets the workflow still runs and produces a debug-signed
# APK, which is installable via `adb install` or sideload but not publishable
# to the Play Store.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Auto-bump patch version ────────────────────────────────────────
  check-and-bump:
    name: Version check and bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.bump.outputs.should_release }}
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes and bump version
        id: bump
        run: |
          CURRENT_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "Current version: $CURRENT_VERSION"

          if git tag -l "v$CURRENT_VERSION" | grep -q "v$CURRENT_VERSION"; then
            echo "Tag v$CURRENT_VERSION already exists"
            COMMITS_SINCE=$(git rev-list "v$CURRENT_VERSION"..HEAD --count 2>/dev/null || echo "0")
            echo "Commits since tag: $COMMITS_SINCE"

            if [ "$COMMITS_SINCE" -eq "0" ]; then
              echo "Nothing new — skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
              exit 0
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Bumping: $CURRENT_VERSION → $NEW_VERSION"

            jq --arg v "$NEW_VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
            jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
            sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src-tauri/tauri.conf.json package.json src-tauri/Cargo.toml
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push

            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "No tag for v$CURRENT_VERSION — first release at this version"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

  # ─── Job 2: Android build + release ────────────────────────────────────────
  release-android:
    name: Build Android APK + AAB
    needs: check-and-bump
    if: needs.check-and-bump.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (post-bump)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        env:
          NDK_VERSION: 29.0.13113456
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;${NDK_VERSION}"
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri CLI (cargo binary)
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Optional release-signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ] || [ -z "${ANDROID_STORE_PASSWORD}" ]; then
            echo "Signing secrets not configured — building debug-signed APK."
            exit 0
          fi
          mkdir -p signing
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > signing/release.keystore
          mkdir -p src-tauri/gen/android
          cat <<EOF > src-tauri/gen/android/keystore.properties
          storeFile=../../../../signing/release.keystore
          storePassword=${ANDROID_STORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Initialize Android project
        # HamCalc keeps src-tauri/gen/ gitignored — regenerate the Android
        # project from tauri.conf.json on every CI run.
        run: cargo tauri android init

      - name: Use HamCalc launcher icons
        # `tauri android init` drops Tauri's default circular launcher icons
        # into the generated res/mipmap-* folders. Overlay the H-logo icon set
        # we keep checked-in under src-tauri/icons/android/ so the installed
        # app shows the HamCalc launcher icon, not the Tauri default.
        run: |
          cp -rv src-tauri/icons/android/. src-tauri/gen/android/app/src/main/res/

      - name: Build Android APK (debug-signed, installable)
        # `--debug` makes Gradle sign with the Android debug keystore. Without
        # `--debug` Gradle produces app-universal-release-unsigned.apk, which
        # Android rejects with "package appears to be invalid". Real release
        # signing is wired up via the ANDROID_* secrets above.
        run: cargo tauri android build --debug --target aarch64

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-${{ needs.check-and-bump.outputs.version }}
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/output-metadata.json
          if-no-files-found: error

      - name: Create release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.check-and-bump.outputs.version }}

          # Prefer the debug-signed APK (what we just built). Fall back to any
          # APK if the file-name pattern changes in a future Tauri release.
          APK=$(find src-tauri/gen/android -name "*-debug.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*.apk" -type f ! -name "*unsigned*" | head -1)
          fi

          if ! gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Creating release v$VERSION"
            gh release create "v$VERSION" \
              --title "HamCalc v$VERSION" \
              --generate-notes \
              --target main
          fi

          if [ -n "$APK" ]; then
            cp "$APK" "HamCalc_${VERSION}.apk"
            gh release upload "v$VERSION" "HamCalc_${VERSION}.apk" --clobber
          else
            echo "No installable APK found under src-tauri/gen/android" >&2
            exit 1
          fi
